<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel 2 — Robotics for Good | RoboCONN</title>
  <link rel="icon" href="rob_hello.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">
</head>
<body>

  <div class="cursor">
    <div class="cursor-dot"></div>
    <div class="cursor-circle"></div>
  </div>

  <header class="robo-header">
    <div class="robo-container">
      <div class="inner">
        <div class="robo-logo">
          <a href="index.html">RoboCONN</a>
        </div>
        <div class="header-btns">
          <div class="robo-main-btn border-btn apply-btn">
            <a href="index.html#apply" class="logo">Register Now</a>
          </div>
          <a href="index.html#apply" class="apply-icon"><i class="ri-clipboard-line"></i></a>
          <div class="theme-btn">
            <i class="ri-sun-fill sun-icon"></i>
            <i class="ri-moon-fill moon-icon"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="panel-section">
    <div class="robo-container">

      <div class="panel-heading">
        <p class="panel-label">Panel 2</p>
        <h1 class="panel-title">Robotics for Good</h1>
        <p class="panel-meta">Earl Hall Schiff Room <span>5:00 – 5:45 pm</span></p>
      </div>

      <div class="panelist-list">
        <div class="panel-empty">
          Panelists for this session will be announced soon. Check back for updates!
        </div>
      </div>

      <div class="robo-main-btn back-btn">
        <a href="index.html#schedule"><i class="ri-arrow-left-line"></i> Back to Schedule</a>
      </div>

    </div>
  </section>

  <footer class="robo-footer">
    <div class="robo-container">
      <p>© <span id="copyright-year">2026</span> RoboCONN. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/panel.js"></script>
</body>
</html>
